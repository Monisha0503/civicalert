name: Build and deploy Node.js app to Azure Web App - civicalert-backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_776CA32202BF4AFFB001DD846F0E6870 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_3740A0299D1D4E45A63F4010C41FD8C5 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2AB1F9D672AB4CACA17D0370FC7F7BDB }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'civicalert-backend'
          slot-name: 'Production'
          package: backend
